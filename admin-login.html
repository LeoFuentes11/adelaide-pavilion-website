<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Adelaide Pavilion</title>
  <!-- Cloudflare Turnstile — bot protection -->
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Lato', 'Open Sans', sans-serif;
      background: #EDF5FC;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      color: #1A2A3D;
    }
    .login-box {
      background: #fff;
      border-radius: 8px;
      padding: 40px 36px;
      box-shadow: 0 4px 24px rgba(26,95,173,0.12);
      width: 100%;
      max-width: 380px;
      text-align: center;
    }
    .login-box h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.6rem;
      color: #1A5FAD;
      margin: 0 0 6px;
    }
    .login-box p {
      font-size: 0.88rem;
      color: #666;
      margin: 0 0 28px;
    }
    .form-group { margin-bottom: 18px; text-align: left; }
    label {
      display: block;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 600;
      color: #1A5FAD;
      margin-bottom: 6px;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #ddd5c8;
      border-radius: 3px;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: #3EAEE0;
      box-shadow: 0 0 0 3px rgba(62,174,224,0.18);
    }
    .error-msg {
      background: rgba(229,115,115,0.12);
      border: 1px solid #e57373;
      border-radius: 4px;
      padding: 10px 14px;
      font-size: 0.85rem;
      color: #c62828;
      margin-bottom: 18px;
      display: none;
    }
    .error-msg.show { display: block; }
    button {
      width: 100%;
      padding: 13px;
      background: #1A5FAD;
      color: #fff;
      border: none;
      border-radius: 3px;
      font-family: 'Lato', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #2B77CC; }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>Adelaide Pavilion</h1>
    <p>Enter your credentials to access the CMS</p>

    <div id="errorMsg" class="error-msg" role="alert"></div>

    <form id="loginForm" action="/api/admin-login" method="POST">
      <input type="hidden" name="redirect" value="/admin/" />

      <div class="form-group">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Enter username"
          autocomplete="username"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Enter password"
          autocomplete="current-password"
          required
        />
      </div>

      <div class="cf-turnstile" data-sitekey="0x4AAAAAACyriY73UOg5Es11" data-theme="light" style="margin-bottom: 18px;"></div>

      <button type="submit" id="submitBtn">Sign In</button>
    </form>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    
    // Set redirect value from URL
    const redirect = params.get('redirect') || '/admin/';
    document.querySelector('input[name="redirect"]').value = redirect;

    // Show error if returned with error
    const errorParam = params.get('error');
    const errorMessages = {
      invalid: 'Incorrect username or password. Please try again.',
      bot: 'Security check failed. Please complete the challenge and try again.',
      ratelimit: 'Too many login attempts. Please wait 15 minutes and try again.',
      misconfigured: 'Login is not configured. Contact the site administrator.'
    };
    if (errorParam && errorMessages[errorParam]) {
      document.getElementById('errorMsg').textContent = errorMessages[errorParam];
      document.getElementById('errorMsg').classList.add('show');
    }
  </script>
</body>
</html>
