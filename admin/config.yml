backend:
  name: github
  repo: LeoFuentes11/adelaide-pavilion-website
  branch: master
  base_url: https://adelaide-pavilion-website.vercel.app
  auth_endpoint: api/auth

publish_mode: editorial_workflow

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:

  # ── Testimonials ──────────────────────────────────────────
  - name: "testimonials"
    label: "Testimonials"
    folder: "_data/testimonials"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Guest Name", name: "name", widget: "string", hint: "e.g. Emma & James" }
      - { label: "Event Type", name: "event", widget: "string", hint: "e.g. Wedding 2024" }
      - { label: "Star Rating", name: "stars", widget: "number", default: 5, min: 1, max: 5 }
      - { label: "Quote", name: "quote", widget: "text" }
      - { label: "Published", name: "published", widget: "boolean", default: true }

  # ── Gallery Images ────────────────────────────────────────
  - name: "gallery"
    label: "Gallery"
    folder: "_data/gallery"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Caption", name: "caption", widget: "string" }
      - { label: "Image", name: "image", widget: "image" }
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["all", "weddings", "corporate", "social", "food", "rooms", "garden"]
      - { label: "Published", name: "published", widget: "boolean", default: true }

  # ── Page Content ──────────────────────────────────────────
  - name: "pages"
    label: "Page Content"
    files:

      # Home Page
      - label: "Home Page"
        name: "homepage"
        file: "_data/homepage.json"
        format: json
        fields:
          - { label: "Hero Script (italic cursive line)", name: "hero_script", widget: "string" }
          - { label: "Hero Title", name: "hero_title", widget: "string" }
          - { label: "Hero Subtitle", name: "hero_subtitle", widget: "string" }
          - { label: "Hero Description", name: "hero_desc", widget: "text" }
          - { label: "Welcome Section Subtitle", name: "welcome_subtitle", widget: "string" }
          - { label: "Welcome Section Title", name: "welcome_title", widget: "string" }
          - { label: "Welcome Paragraph 1", name: "welcome_para1", widget: "text" }
          - { label: "Welcome Paragraph 2", name: "welcome_para2", widget: "text" }
          - label: "Testimonials (3 cards)"
            name: "testimonials"
            widget: "list"
            fields:
              - { label: "Quote", name: "quote", widget: "text" }
              - { label: "Guest Name", name: "author", widget: "string", hint: "e.g. Roanna" }
              - { label: "Event Type", name: "event", widget: "string", hint: "e.g. Corporate Client" }

      # About Page
      - label: "About Page"
        name: "about"
        file: "_data/about.json"
        format: json
        fields:
          - { label: "Hero Script", name: "hero_script", widget: "string" }
          - { label: "Hero Title", name: "hero_title", widget: "string" }
          - { label: "Hero Subtitle", name: "hero_subtitle", widget: "string" }
          - { label: "History Section Label", name: "history_subtitle", widget: "string" }
          - { label: "History Section Title", name: "history_title", widget: "string" }
          - { label: "History Paragraph 1", name: "history_para1", widget: "text" }
          - { label: "History Paragraph 2", name: "history_para2", widget: "text" }
          - { label: "History Paragraph 3", name: "history_para3", widget: "text" }
          - { label: "History Paragraph 4 (Gardens)", name: "history_para4", widget: "text" }
          - { label: "Legacy Paragraph (Est. section)", name: "legacy_para", widget: "text" }

      # Weddings Page
      - label: "Weddings Page"
        name: "weddings"
        file: "_data/weddings.json"
        format: json
        fields:
          - { label: "Hero Script", name: "hero_script", widget: "string" }
          - { label: "Hero Title", name: "hero_title", widget: "string" }
          - { label: "Hero Subtitle", name: "hero_subtitle", widget: "string" }
          - { label: "Hero Description", name: "hero_desc", widget: "text" }
          - { label: "Intro Paragraph 1", name: "intro_para1", widget: "text" }
          - { label: "Intro Paragraph 2", name: "intro_para2", widget: "text" }
          - { label: "Featured Testimonial Quote", name: "testimonial_quote", widget: "text" }
          - { label: "Featured Testimonial Attribution", name: "testimonial_author", widget: "string", hint: "e.g. — Emma & James, Wedding Reception 2025" }

      # Corporate Page
      - label: "Corporate Page"
        name: "corporate"
        file: "_data/corporate.json"
        format: json
        fields:
          - { label: "Hero Script", name: "hero_script", widget: "string" }
          - { label: "Hero Title", name: "hero_title", widget: "string" }
          - { label: "Hero Subtitle", name: "hero_subtitle", widget: "string" }
          - { label: "Intro Paragraph 1", name: "intro_para1", widget: "text" }
          - { label: "Intro Paragraph 2", name: "intro_para2", widget: "text" }

      # Social Events Page
      - label: "Social Events Page"
        name: "social"
        file: "_data/social.json"
        format: json
        fields:
          - { label: "Hero Script", name: "hero_script", widget: "string" }
          - { label: "Hero Title", name: "hero_title", widget: "string" }
          - { label: "Hero Subtitle", name: "hero_subtitle", widget: "string" }
          - { label: "Intro Paragraph 1", name: "intro_para1", widget: "text" }
          - { label: "Intro Paragraph 2", name: "intro_para2", widget: "text" }
          - { label: "Featured Testimonial Quote", name: "testimonial_quote", widget: "text" }
          - { label: "Featured Testimonial Attribution", name: "testimonial_author", widget: "string", hint: "e.g. — The Henderson Family, Milestone Birthday 2024" }

      # Packages & Pricing
      - label: "Packages & Pricing"
        name: "packages"
        file: "_data/packages.json"
        format: json
        fields:
          - { label: "Hero Script", name: "hero_script", widget: "string" }
          - { label: "Hero Title", name: "hero_title", widget: "string" }
          - { label: "Hero Subtitle", name: "hero_subtitle", widget: "string" }
          - { label: "Wedding Signature — Price 2026 (pp)", name: "wedding_signature_price_2026", widget: "number" }
          - { label: "Wedding Signature — Price 2027 (pp)", name: "wedding_signature_price_2027", widget: "number" }
          - { label: "Wedding Signature — Price 2028 (pp)", name: "wedding_signature_price_2028", widget: "number" }
          - { label: "Wedding Signature — Price Label", name: "wedding_signature_price_label", widget: "string", hint: "e.g. per person · 2026  |  $150pp 2027  |  $160pp 2028" }
          - { label: "Wedding Pavilion — Price 2026 (pp)", name: "wedding_pavilion_price_2026", widget: "number" }
          - { label: "Wedding Pavilion — Price 2027 (pp)", name: "wedding_pavilion_price_2027", widget: "number" }
          - { label: "Wedding Pavilion — Price 2028 (pp)", name: "wedding_pavilion_price_2028", widget: "number" }
          - { label: "Wedding Pavilion — Price Label", name: "wedding_pavilion_price_label", widget: "string", hint: "e.g. per person · 2026  |  $160pp 2027  |  $170pp 2028" }
          - { label: "Wedding Cocktail — Price (pp)", name: "wedding_cocktail_price", widget: "number" }
          - { label: "Social — 2 Course Main+Dessert (pp)", name: "social_two_course_main_dessert", widget: "number" }
          - { label: "Social — 2 Course Entrée+Main (pp)", name: "social_two_course_entree_main", widget: "number" }
          - { label: "Social — 3 Course Set (pp)", name: "social_three_course_set", widget: "number" }
          - { label: "Social — 3 Course Alternate (pp)", name: "social_three_course_alternate", widget: "number" }
          - { label: "Social — Cocktail (pp)", name: "social_cocktail", widget: "number" }
          - { label: "Social — Street Eats (pp)", name: "social_street_eats", widget: "number" }
          - { label: "Corporate — Continental Breakfast (pp)", name: "corporate_breakfast_continental", widget: "number" }
          - { label: "Corporate — Hot Breakfast (pp)", name: "corporate_breakfast_hot", widget: "number" }
          - { label: "Corporate — Networking (pp)", name: "corporate_networking", widget: "number" }
          - { label: "Corporate — Cocktail (pp)", name: "corporate_cocktail", widget: "number" }
          - { label: "Children — Menu 1 (pp)", name: "children_menu1", widget: "number" }
          - { label: "Children — Menu 2 (pp)", name: "children_menu2", widget: "number" }
          - { label: "Children — Cocktail (pp)", name: "children_cocktail", widget: "number" }

          - label: "— Beverage Packages —"
            name: "bev_divider"
            widget: "hidden"
            default: ""
          - { label: "Standard — 2 Hours", name: "bev_standard_2hr", widget: "string", hint: "e.g. $24pp" }
          - { label: "Standard — 3 Hours", name: "bev_standard_3hr", widget: "string", hint: "e.g. $28pp" }
          - { label: "Standard — 4 Hours", name: "bev_standard_4hr", widget: "string", hint: "e.g. $33pp" }
          - { label: "Standard — 5 Hours", name: "bev_standard_5hr", widget: "string", hint: "e.g. $38pp" }
          - label: "Standard Package — Includes"
            name: "bev_standard_includes"
            widget: "list"
            field: { label: "Item", name: "item", widget: "string" }
          - { label: "Premium Package — Surcharge Label", name: "bev_premium_surcharge", widget: "string", hint: "e.g. Standard price + $10pp" }
          - label: "Premium — Red Wine Options"
            name: "bev_premium_reds"
            widget: "list"
            field: { label: "Wine", name: "item", widget: "string" }
          - label: "Premium — White Wine Options"
            name: "bev_premium_whites"
            widget: "list"
            field: { label: "Wine", name: "item", widget: "string" }
          - label: "Premium — Beer & Extras"
            name: "bev_premium_extras"
            widget: "list"
            field: { label: "Item", name: "item", widget: "string" }
          - { label: "Deluxe Package — Surcharge Label", name: "bev_deluxe_surcharge", widget: "string", hint: "e.g. Standard price + $15pp" }
          - label: "Deluxe — Red Wine Options"
            name: "bev_deluxe_reds"
            widget: "list"
            field: { label: "Wine", name: "item", widget: "string" }
          - label: "Deluxe — White Wine Options"
            name: "bev_deluxe_whites"
            widget: "list"
            field: { label: "Wine", name: "item", widget: "string" }
          - label: "Deluxe — Beer & Extras"
            name: "bev_deluxe_extras"
            widget: "list"
            field: { label: "Item", name: "item", widget: "string" }
          - { label: "Non-Alcoholic Package Price", name: "bev_nonalcoholic_price", widget: "string", hint: "e.g. $27pp · 4-hour minimum" }
          - label: "Non-Alcoholic Package — Includes"
            name: "bev_nonalcoholic_includes"
            widget: "list"
            field: { label: "Item", name: "item", widget: "string" }
          - { label: "Extension Rate", name: "bev_extension_rate", widget: "string", hint: "e.g. $6.50pp/hr" }
          - { label: "Bottled Beer Upgrade Rate", name: "bev_bottled_beer_rate", widget: "string", hint: "e.g. from $3.00pp" }
          - { label: "Cider Rate", name: "bev_cider_rate", widget: "string", hint: "e.g. $3.00pp" }
          - { label: "Moscato Rate", name: "bev_moscato_rate", widget: "string", hint: "e.g. $3.00pp" }
          - { label: "Spirits Rate", name: "bev_spirits_rate", widget: "string", hint: "e.g. POA" }
          - { label: "BYO Spirits — Label", name: "bev_byo_label", widget: "string" }
          - { label: "BYO Spirits — Rate", name: "bev_byo_rate", widget: "string", hint: "e.g. No corkage" }

      # Full Menus
      - label: "Full Menus"
        name: "menus"
        file: "_data/menus.json"
        format: json
        fields:
          - label: "Entrée Selections"
            name: "entrees"
            widget: "list"
            fields:
              - { label: "Dish Name", name: "name", widget: "string" }
              - { label: "Description", name: "desc", widget: "string" }
              - { label: "Surcharge (leave blank if none)", name: "surcharge", widget: "string", required: false }
          - label: "Main Selections"
            name: "mains"
            widget: "list"
            fields:
              - { label: "Dish Name", name: "name", widget: "string" }
              - { label: "Description", name: "desc", widget: "string" }
              - { label: "Surcharge (leave blank if none)", name: "surcharge", widget: "string", required: false }
          - label: "Dessert Selections"
            name: "desserts"
            widget: "list"
            fields:
              - { label: "Dish Name", name: "name", widget: "string" }
              - { label: "Description", name: "desc", widget: "string" }
          - label: "Hot Canapés"
            name: "canapes_hot"
            widget: "list"
            fields:
              - { label: "Dish Name", name: "name", widget: "string" }
              - { label: "Description", name: "desc", widget: "string" }
          - label: "Cold Canapés"
            name: "canapes_cold"
            widget: "list"
            fields:
              - { label: "Dish Name", name: "name", widget: "string" }
              - { label: "Description", name: "desc", widget: "string" }

      # Contact Info
      - label: "Contact Information"
        name: "contact"
        file: "_data/contact.json"
        format: json
        fields:
          - { label: "Phone (display)", name: "phone_display", widget: "string", hint: "e.g. 08 8212 7444" }
          - { label: "Phone (tel: link)", name: "phone_tel", widget: "string", hint: "e.g. tel:0882127444" }
          - { label: "Email Address", name: "email", widget: "string" }
          - { label: "Email (mailto: link)", name: "email_href", widget: "string", hint: "e.g. mailto:contact@adelaidepavilion.com.au" }
          - { label: "Footer Address (HTML)", name: "address_footer", widget: "text", hint: "Use <br> for line breaks" }
          - { label: "Facebook URL", name: "facebook_url", widget: "string" }
          - { label: "Instagram URL", name: "instagram_url", widget: "string" }
          - { label: "Google Maps URL", name: "maps_url", widget: "string" }
